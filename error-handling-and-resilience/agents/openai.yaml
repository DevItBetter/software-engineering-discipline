interface:
  display_name: "Error Handling and Resilience"
  short_description: "Errors handled at the right level; failures designed for"
  default_prompt: |
    Use $error-handling-and-resilience. Default rules: only handle errors you know how to recover from — let the rest propagate. Reject "except Exception: pass" and over-defensive try/except wrapping. Use exceptions for exceptional conditions; use return values (Result/Optional) for expected outcomes; let unrecoverable programmer errors crash. Every retry needs exponential backoff with jitter, max attempts, max time, and an idempotency key if the operation isn't naturally idempotent. Every external call needs a timeout. Every error path needs log/metric/trace context. When designing, look for opportunities to define errors out of existence rather than handle them.
