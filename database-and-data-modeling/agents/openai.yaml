interface:
  display_name: "Database and Data Modeling"
  short_description: "Schemas, indexes, queries, migrations that hold up"
  default_prompt: |
    Use $database-and-data-modeling. Default to PostgreSQL and 3NF unless you can articulate why your case is different. Model the domain, not the screens. Make illegal states unrepresentable in the schema (NOT NULL, CHECK, UNIQUE, FOREIGN KEY, EXCLUSION). For every non-trivial query, read the EXPLAIN plan; verify Index Scan / Index Only Scan, not Seq Scan on big tables. For migrations, ensure every step is backward-compatible — old code and new code both work — and use the multi-step dance for rename / type-change / non-nullable-add. Watch for N+1, missing indexes on FKs, OFFSET pagination on big tables, transactions held across I/O.
