interface:
  display_name: "API and Interface Design"
  short_description: "APIs that are hard to misuse, easy to evolve, honest"
  default_prompt: |
    Use $api-and-interface-design. Treat Hyrum's Law as physics: every observable behavior becomes a contract. Make as little observable as possible; document and stabilize what you do expose. Make illegal states unrepresentable via types. Avoid boolean traps and primitive obsession at boundaries. Defaults must be safe under uncertainty. Errors are part of the contract — design them with stable error codes, safe diagnostic context such as request id/offending field, and no internals, stack traces, SQL, tokens, or parseable human message text as a stable contract. For retryable mutations, design the idempotency model. For compatibility claims, collect schema/API diff, known clients/call sites/SDKs, contract tests, error/status/field/default behavior changes, and versioning policy; do not claim compatibility unless the change is additive under the documented contract or consumer evidence supports it.
