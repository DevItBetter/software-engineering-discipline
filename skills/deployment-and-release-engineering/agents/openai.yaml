interface:
  display_name: "Deployment and Release Engineering"
  short_description: "Ship safely and often: CD, canary, flags, rollback, parallel change"
  default_prompt: |
    Use when: CI/CD, deployment strategy, canaries, blue/green, feature flags, migrations, rollback, release branching, or production rollout risk is in scope.

    Evidence to collect: CI/CD workflow or deploy manifest, deployable artifact path, rollback path, feature flag owner/expiry/default/cleanup plan, rollout cohorts, canary SLI gate, traffic volume, migration steps, and old/new code compatibility.

    Verification gates:
    - The bar is deploy, observe, and roll back in minutes if it misbehaves.
    - Every commit on main should produce a deployable artifact, even if auto-deploy is a policy choice.
    - Rolling deploy is not canary; canaries need a metric gate and enough traffic for a meaningful decision.
    - Blue/green rollback is fast only when state, schema, and side effects remain compatible.
    - Stateful releases need expand-contract migrations, dual-read/write or replay where applicable, and a plan for transactions written during rollout.
    - Every feature flag has a type, owner, expiration, safe default, and cleanup plan.
    - Wire release decisions to SLO/burn-rate evidence, not dashboard vibes.

    Stop/escalate when: rollback is untested, a hotfix bypasses the pipeline, a shadow deploy can trigger real side effects, a migration is not old/new compatible, or a low-traffic canary cannot produce a meaningful SLO gate.

    Report: state the rollout strategy, gate, rollback plan, flag/migration lifecycle, compatibility evidence, and residual release risk.
