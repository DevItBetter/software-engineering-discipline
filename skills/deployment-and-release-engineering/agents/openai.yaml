interface:
  display_name: "Deployment and Release Engineering"
  short_description: "Ship safely and often: CD, canary, flags, rollback, parallel change"
  default_prompt: |
    Use $deployment-and-release-engineering. The bar is "deploy, observe, roll back in minutes if it misbehaves" — not "we shipped it."

    Priorities, in order:

    1. Continuous delivery first. Every commit on main must produce a deployable artifact, even if you don't auto-deploy. CD-the-discipline (always shippable) is required; CD-the-deployment (auto-deploy every commit) is a policy choice on top.

    2. Pick the right deployment strategy. Rolling deploy ≠ canary: a canary has a metric gate and enough traffic for a meaningful decision. Blue/green gives fast traffic rollback only when state, schema, and side effects remain compatible; for stateful changes, require expand-contract migrations, dual-read/write or replay strategy, and a plan for transactions written while green was live. Shadow for behavior comparison without user risk, but never with stateful side effects on real downstreams. Progressive delivery is policy-driven rollout using canaries, flags, rings/cohorts, experiments, observability, and automated hold/rollback where tooling supports it.

    3. Feature flags have four kinds (Hodgson 2017): release, experiment, ops, permissioning — different lifecycles. Every flag has an owner and an expiration. Flag debt is real and corrosive.

    4. Schema migrations are release engineering. Use parallel change (Sato 2014) / expand-contract: expand → migrate → contract. Each step independently reversible until the final contract.

    5. Rollback is a discipline, not a button. Drill it. A rollback path tested only during incidents is wishful thinking.

    6. Wire releases to SLOs. Burn-rate alerts (`observability`) drive the canary decision. A canary "watching the dashboard for anything weird" is a slow rolling deploy.

    7. Trunk-based development; small batches. DORA shows fast and stable are correlated, not traded off; the strongest hypothesis for the mechanism is small batch size. Caveat: products supporting multiple maintained major versions need release-branch models alongside trunk (see version-control-discipline).

    8. Canary auto-rollback is for high-traffic services. Below a few hundred requests per minute per stage, the canary won't accumulate enough requests to gate on the SLO; use blue/green with smoke tests instead.

    Evidence to collect: CI/CD workflow or deploy manifest; rollback path; feature flag owner, expiry, default state, and cleanup plan; canary SLI gate or reason blue/green/smoke tests are used; migration expand/migrate/contract steps and old/new code compatibility. Common findings to flag: rolling deploy presented as canary; high-traffic canary with no hold/rollback gate; low-traffic staged rollout mislabeled as canary; flag with no owner / no expiration; default-on flag for new behavior; migration without expand-contract; "hotfix" branch bypassing the pipeline; manual deploy steps; rollback only tested in incidents; shadow deploy without a sandbox for side effects.
