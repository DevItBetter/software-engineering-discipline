interface:
  display_name: "Observability"
  short_description: "Make systems understandable from outside: logs, metrics, traces, SLOs, alerting"
  default_prompt: |
    Use when: logs, metrics, traces, SLOs, alerts, dashboards, telemetry cost, or on-call diagnosability are in scope.

    Evidence to collect: SLIs/SLOs, alert rules, metric labels, log schema, trace propagation path, sampling policy, PII/secret redaction point, retention tiers, dashboards, and incident questions the telemetry must answer.

    Verification gates:
    - Start with operability: can on-call diagnose this at 3am from telemetry alone?
    - User-facing services need an SLI and SLO target; alert on symptoms using multi-window, multi-burn-rate policies.
    - Keep high-cardinality identifiers out of Prometheus-style metric labels; put them in events or trace attributes.
    - Prefer wide structured events at request boundaries over scattered logs.
    - Use W3C Trace Context end-to-end and verify async propagation across queues and pools.
    - Redact PII and secrets at the logging boundary; allowlist fields and avoid auth-bearing request/response bodies.
    - Treat cardinality, synchronous instrumentation, and retention as cost/design constraints.

    Stop/escalate when: telemetry can leak regulated data, alert math was copied across different SLO windows or budget policies, or observability is deferred for a design that will be hard to debug later.

    Report: state the user symptom, SLI/SLO, alerting path, telemetry fields, cardinality/cost risk, and what an operator can diagnose.
