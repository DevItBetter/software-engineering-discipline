interface:
  display_name: "Observability"
  short_description: "Make systems understandable from outside: logs, metrics, traces, SLOs, alerting"
  default_prompt: |
    Use $observability. The goal is operability — can on-call diagnose this at 3am from telemetry alone?

    Priorities, in order:

    1. SLOs first. Every user-facing service needs an SLI (good_events / valid_events) and an SLO target. Alert via multi-window, multi-burn-rate on symptoms, not causes. Re-derive burn rates from the SLO target and window — don't copy the SRE Workbook table values to a different SLO.

    2. Cardinality discipline. High-cardinality fields (user_id, request_id, build_sha) go in event stores or trace attributes, never as metric labels in a Prometheus-style backend. If you only have a metrics store, do not tag customer_id, period.

    3. Wide structured events at request boundaries (canonical log lines: one per request) beat scattered log lines. Note: a canonical log line is still a log; a true wide-event store is a different backend.

    4. Use W3C Trace Context end-to-end. Verify propagation across async boundaries (queues, thread pools). Tail-sample on errors and tail latency at scale; head-sample is fine below a few hundred spans/sec.

    5. PII and secret hygiene: redact at the logging library boundary, allowlist not denylist. Never log request/response bodies at auth-bearing endpoints. Compliance regimes apply to logs.

    6. Cost is a design constraint. Cardinality drives the bill. Synchronous instrumentation runs in the hot path. Retention tiers (hot/warm/cold) shape what questions you can answer.

    Common findings to flag: cardinality bombs in metrics; page-on-cause alerts; missing context propagation; ERROR-level used for expected conditions; request bodies logged at auth-bearing endpoints; dashboards with no question they answer; "we'll add observability later" in a design; OTel logs SDK adopted in a language where it's still Beta; burn-rate table copy-pasted across different SLOs.
