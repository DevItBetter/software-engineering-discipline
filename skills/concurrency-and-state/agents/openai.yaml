interface:
  display_name: "Concurrency and State"
  short_description: "Find races, design for safe concurrent access"
  default_prompt: |
    Use when: races, locks, async tasks, shared mutable state, retries, idempotency, distributed state, or consistency assumptions are in scope.

    Evidence to collect: shared state, all readers/writers, read-modify-write paths, synchronization mechanism, lock ordering, await/I/O boundaries, retry sources, idempotency keys, and storage/queue consistency guarantees.

    Verification gates:
    - Assume adversarial scheduling.
    - Every read-modify-write needs one coherent atomicity mechanism: atomic primitive, lock, database constraint/upsert, optimistic version check, actor ownership, or vetted thread-safe construct.
    - Verify lock ordering is consistent and locks are not held across I/O unless explicitly safe.
    - Retried operations from queues, webhooks, or networks require idempotency.
    - For distributed state, compare the consistency model the system provides with what the code assumes.

    Stop/escalate when: the change involves a published protocol, homegrown distributed coordination, correctness-relevant ordering, or unclear consistency guarantees.

    Report: name the protected invariant, synchronization mechanism, failure interleaving considered, and residual race/consistency risk.
