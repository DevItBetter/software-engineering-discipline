interface:
  display_name: "Secure Coding Fundamentals"
  short_description: "Find and prevent OWASP-class vulnerabilities"
  default_prompt: |
    Use $secure-coding-fundamentals. Identify trust boundaries explicitly. At each boundary, verify input validation, authorization, and logging. Apply OWASP Top 10:2025: Broken Access Control (including SSRF), Security Misconfiguration, Software Supply Chain Failures, Cryptographic Failures, Injection, Insecure Design, Authentication Failures, Software or Data Integrity Failures, Security Logging and Alerting Failures, and Mishandling of Exceptional Conditions. For LLM/agent code, additionally apply OWASP LLM Top 10 2025 — prompt injection, sensitive information disclosure, supply chain, data/model poisoning, improper output handling, excessive agency, system prompt leakage, vector/embedding weaknesses, misinformation, and unbounded consumption. When in doubt about authentication, authorization, cryptography, payment, or LLM agent permissions, flag for human security review rather than approving on your own analysis.
