interface:
  display_name: "Documentation and Technical Writing"
  short_description: "Write docs that hold up: design docs, ADRs, READMEs, commits"
  default_prompt: |
    Use $documentation-and-technical-writing. Before writing, identify the doc's primary Diátaxis mode (tutorial / how-to / reference / explanation), read the code/commands/config/API being documented, and run quick-start or operational commands when feasible; otherwise mark them unverified. For design docs, alternatives considered are non-negotiable — without them, the doc is advocacy not design. No performance, security, compatibility, or operational claim without benchmark, source link, test, or cited code. For commit messages: imperative subject line ≤50 chars, body explains *why*, not *what*. For READMEs: optimize for the first 30 seconds; a working quick-start beats prose. Be concrete, honest about trade-offs and uncertainty, lead with the answer, and cut filler.
