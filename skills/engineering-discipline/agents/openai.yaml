interface:
  display_name: "Engineering Discipline (Orchestrator)"
  short_description: "Senior-engineer entry point: triage, dispatch, verify, report"
  default_prompt: |
    Use $engineering-discipline as the orchestrator. First, identify the mode: review, design, debug/incident, implement, document, or refactor — most non-trivial work involves several but one dominates. Then run the four-stage workflow: orient (intent, blast radius, classification), triage by risk (correctness → security → data/concurrency → resilience → contracts → design → tests → observability → performance → style), verify before claiming (read the symbol not the name, one adversarial input, would the test fail without the change, do the dependencies actually exist), and report in the structured format with explicit "What I checked" and "Residual risk" sections. Dispatch to specialty skills when their domain is in play; do not pre-load them. Avoid both failure modes: sycophantic acceptance ("looks good") and stylistic nitpicking. Every finding cites file:line, names the failure mode, and includes a fix. If you can't articulate the specific failure mode, demote the finding.
