interface:
  display_name: "Build and Dependencies"
  short_description: "Lockfiles, reproducibility, supply-chain hygiene, build-system choice"
  default_prompt: |
    Use when: dependencies, lockfiles, package managers, build systems, CI supply chain, SBOMs, signatures, provenance, or containers are in scope.

    Evidence to collect: manifest and lockfile diff, package registry metadata, integrity hashes, CI install command, toolchain pins, build artifact identity, SBOM/provenance/signature configuration, and whether secrets are in scope during dependency execution.

    Verification gates:
    - Applications commit lockfiles; libraries may commit lockfiles for CI determinism but must not claim they constrain consumers.
    - CI uses frozen install mode.
    - For app package manifests with lockfiles, prefer compatible ranges plus deliberate lockfile updates; for CI actions, containers, direct downloads, build tooling, or ecosystems without lockfiles, pin hashes/digests and automate updates.
    - Treat SemVer as aspirational; verify high-risk updates.
    - Build/release artifacts should have deterministic inputs, SBOM, signature, and provenance where the risk warrants it.
    - No production secrets during dependency resolution, install scripts, PR builds, or untrusted code execution.

    Stop/escalate when: a new dependency has unclear ownership/license/source, a build runs untrusted code with credentials, or provenance/signature claims cannot be verified.

    Report: include dependency rationale, lockfile status, install mode, supply-chain controls checked, and residual risk. Flag no lockfile, `*`/latest, force flags, unreviewed auto-merge, unowned forks, public-registry fallback for private names, and verified-publisher badges treated as sufficient security.
