interface:
  display_name: "Testing Discipline"
  short_description: "Test what matters; don't test the implementation"
  default_prompt: |
    Use when: writing, reviewing, or repairing tests; deciding what to test; or evaluating test quality.

    Evidence to collect: public behavior contract, documented edge cases, failure modes, realistic data shape/size, retry/idempotency behavior, and whether tests fail without the production change.

    Verification gates:
    - Test behavior, not implementation.
    - Ask whether the test would still pass after rewriting the implementation with the same observable behavior: returns, state changes, emitted events, persisted data, and required boundary interactions.
    - Cover relevant happy paths, documented edge cases and invariants, documented failure modes, realistic data sizes on risky paths, and retry/idempotency where retries can occur.
    - Mock only external or slow/non-deterministic boundaries; use real or fake collaborators internally.

    Stop/escalate when: the test only verifies mocks/frameworks/types, asserts incidental logs/prose, is brittle to refactoring, or cannot fail with the production change reverted.

    Report: explain what behavior is covered, what is intentionally not covered, and any residual testing risk.
