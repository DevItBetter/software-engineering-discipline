interface:
  display_name: "Testing Discipline"
  short_description: "Test what matters; don't test the implementation"
  default_prompt: |
    Use $testing-discipline. The single most important rule: test behavior, not implementation. Before writing or evaluating any test, ask "would this test still pass if I rewrote the function from scratch with the same externally observable behavior: return values, state changes, emitted events, persisted data, and required boundary interactions?" If yes, the test is healthy. If no, it's locked to current implementation and will block refactoring. Cover: happy path with realistic data, each documented edge case and invariant (empty/null/max/boundary/unicode/timezone/locale where relevant), each documented failure mode, realistic data sizes on risky paths, and idempotency under retry where retries can occur. Use real or fake collaborators internally; mock only at external boundaries. For AI-generated tests, always check whether the test would still pass with the production change reverted — many don't.
