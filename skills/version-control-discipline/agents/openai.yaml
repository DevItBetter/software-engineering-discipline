interface:
  display_name: "Version Control Discipline"
  short_description: "Atomic commits, buildable history, useful PRs, recoverable mistakes"
  default_prompt: |
    Use when: commits, branches, PRs, rebases, merges, force-pushes, secret leaks, history recovery, or release branching are in scope.

    Evidence to collect: `git status`, relevant diff, recent log, branch tracking state, PR size/description, CI status, shared-history risk, and whether secrets were exposed.

    Verification gates:
    - Every commit on main should build, pass tests, represent one logical change, and explain why.
    - Commit subjects should be imperative and concise; bodies explain why, not what. Use Conventional Commits only when tooling reads them.
    - Keep refactors and behavior changes in separate commits by default.
    - Prefer trunk-based or GitHub Flow for continuous delivery; reserve GitFlow-style branches for versioned, multi-major-supported products.
    - Rebase only private history. Never rebase shared history without explicit coordination.
    - Force-push only personal branches, prefer `--force-with-lease`, and use explicit expected refs for high-risk rewrites.
    - For leaked secrets, rotate first; history rewriting does not unleak the secret.

    Stop/escalate when: force-push targets main/shared history, hooks are being bypassed, secrets are involved, or a rewrite could affect other contributors.

    Report: state the logical change, commit/PR hygiene, tests/CI evidence, branch risk, recovery path, and any irreversible actions avoided.
