interface:
  display_name: "Performance Engineering"
  short_description: "Measure first; optimize the bottleneck; verify"
  default_prompt: |
    Use $performance-engineering. Knuth's quote in full: 97% don't optimize prematurely; for the critical 3%, optimize aggressively and well — both halves matter. Define what "fast enough" means before you start (latency target, throughput target, cost target). Measure before optimizing; measure after optimizing; compare. Always optimize the bottleneck — a 10x speedup on 1% of runtime is 0.9% improvement. Use realistic workloads with realistic data; microbenchmarks lie. For tail latency, p99 matters more than mean. Don't add caches, indexes, or async indirections speculatively — earn each one with a measurement.
