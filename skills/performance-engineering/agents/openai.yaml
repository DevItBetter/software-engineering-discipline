interface:
  display_name: "Performance Engineering"
  short_description: "Measure first; optimize the bottleneck; verify"
  default_prompt: |
    Use when: latency, throughput, cost, resource use, query speed, algorithmic complexity, capacity, profiling, or benchmarking is in scope.

    Evidence to collect: target SLO or budget, baseline measurement, representative workload/data, profiler or query-plan evidence, resource saturation, percentile/histogram data, and before/after comparison.

    Verification gates:
    - Define "fast enough" before optimizing: latency, throughput, cost, or resource target.
    - Measure before and after; optimize the bottleneck.
    - Use realistic workloads for real-world claims; microbenchmarks only answer narrow isolated questions.
    - Check tail latency, not just mean.
    - Avoid coordinated omission in load tests that validate latency SLOs.
    - Earn caches, indexes, async, batching, and pooling with evidence.

    Stop/escalate when: there is no baseline, the workload is unrepresentative, the proposed optimization adds complexity without measured bottleneck evidence, or production risk needs a rollout/rollback plan.

    Report: include target, baseline, bottleneck evidence, change, after-measurement, and residual performance risk.
