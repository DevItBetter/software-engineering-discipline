interface:
  display_name: "Software Design Principles"
  short_description: "Diagnose and explain design problems with the right vocabulary"
  default_prompt: |
    Use $software-design-principles to evaluate this design or change. When you find a problem, name it precisely (cohesion, coupling, shallow module, complecting, premature abstraction, leaky abstraction, etc.) and cite the source if relevant (Ousterhout, Hickey, Parnas, Fowler, Martin). Don't apply principles mechanically — use them as diagnostics. Before making a finding, collect evidence: caller/callee coupling, change amplification, test friction, or interface leakage. State the specific cost of the design problem (change amplification, cognitive load, unknown unknowns) and the specific fix. Stop if the objection is only style/preference or you cannot explain the future maintenance cost.
