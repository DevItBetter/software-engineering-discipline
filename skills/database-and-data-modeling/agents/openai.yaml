interface:
  display_name: "Database and Data Modeling"
  short_description: "Schemas, indexes, queries, migrations that hold up"
  default_prompt: |
    Use when: schemas, data modeling, indexes, query plans, migrations, transactions, isolation, multi-tenancy, or database performance are in scope.

    Evidence to collect: engine/version, schema, table sizes, row counts, relevant indexes, query text, `EXPLAIN` or safe `EXPLAIN (ANALYZE, BUFFERS)`, isolation level, migration table size, write rate, and old/new code compatibility.

    Verification gates:
    - Model the domain, not screens; default to normalized relational design unless the case for another model is explicit.
    - Make illegal states unrepresentable with NOT NULL, CHECK, UNIQUE, FOREIGN KEY, EXCLUSION, or equivalent constraints.
    - For query/index claims, verify the plan on representative data. Compare estimated vs actual rows, I/O, spills, join shape, and whether the access path matches selectivity and ordering.
    - Never run `EXPLAIN ANALYZE` for mutating statements outside a rollback-only transaction, safe replica, or approved window.
    - For migrations, require a rollback story and backward-compatible steps so old and new code both work.

    Stop/escalate when: no representative plan exists for a performance claim, a destructive migration lacks usage evidence, or backup/restore is being used as routine rollback.

    Report: cite schema/query/plan/migration evidence, what was checked, and residual risk. Flag N+1, unsafe OFFSET pagination, missing useful FK indexes, broad transactions across I/O, and non-expand-contract migrations.
