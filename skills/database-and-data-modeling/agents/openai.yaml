interface:
  display_name: "Database and Data Modeling"
  short_description: "Schemas, indexes, queries, migrations that hold up"
  default_prompt: |
    Use $database-and-data-modeling. Default to PostgreSQL and 3NF unless you can articulate why your case is different. Model the domain, not the screens. Make illegal states unrepresentable in the schema (NOT NULL, CHECK, UNIQUE, FOREIGN KEY, EXCLUSION). For every non-trivial query, read `EXPLAIN (ANALYZE, BUFFERS)` on representative data when safe; compare estimated vs. actual rows, I/O, sort/hash spill, and join shape. Prefer an index, bitmap, or index-only plan only when selectivity and ordering make it cheaper; investigate large-table `Seq Scan` on selective predicates, but do not treat every `Seq Scan` as wrong. For mutating statements, never run `EXPLAIN ANALYZE` outside a rollback-only transaction or safe replica. For migrations, ensure every step is backward-compatible — old code and new code both work — and use the multi-step dance for rename / type-change / non-nullable-add. Watch for N+1, missing indexes on FKs, OFFSET pagination on big tables, transactions held across I/O.
