interface:
  display_name: "Caching Strategies"
  short_description: "Placement, invalidation, stampede protection, eviction; trade freshness for latency"
  default_prompt: |
    Use when: adding, reviewing, or debugging browser, CDN, proxy, app, distributed, database, materialized-view, or HTTP caching.

    Evidence to collect: cached value, source of truth, cache layer, key design, TTL/staleness SLO, invalidation path, max size/eviction policy, stampede protection, failure behavior, sensitivity/personalization, and write/update flow.

    Verification gates:
    - Name the freshness, latency, throughput, and load trade-off; bound staleness explicitly.
    - Every cache needs max size and TTL or an equally explicit lifecycle.
    - Place the cache deliberately and verify invalidation at every layer.
    - Pick the strategy by consistency and write-throughput needs: cache-aside, read-through, write-through, write-back, write-around, or refresh-ahead.
    - Protect hot or cold-miss paths from stampedes with single-flight, probabilistic early expiration, or stale-while-revalidate where appropriate.
    - For HTTP caching, apply RFC 9111 semantics. `Vary` is cache-key matching, not a privacy control.
    - Avoid non-atomic DB/cache dual writes; use transactional outbox plus CDC where correctness requires it.

    Stop/escalate when: cache becomes source of truth, loss of cache causes outage, personalized/auth-dependent data may enter shared cache, TTL is gut feel, or writes require cross-store atomicity.

    Report: state source of truth, cache placement, key, invalidation, staleness bound, stampede control, sensitivity controls, and failure behavior.
