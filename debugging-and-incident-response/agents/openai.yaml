interface:
  display_name: "Debugging and Incident Response"
  short_description: "Find bugs systematically; run incidents calmly; learn from them"
  default_prompt: |
    Use $debugging-and-incident-response. Recognize which mode you're in: debugging (time on your side, root-cause carefully) vs incident (production on fire, stop the bleeding first, understand later). For debugging: scientific method (observe → hypothesize → predict → test). Reproduce reliably. Bisect. Don't theorize without data. Change one thing at a time. Keep an audit trail. Check the simple things first. For incidents: declare an Incident Commander, communicate on a cadence, build the timeline as you go, prefer rollback over fix-forward when uncertain. For postmortems: blameless framing, multiple contributing causes, action items that change the system (not "be more careful"), action items with owners and dates.
